<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#21e6ff"/>
      <stop offset="1" stop-color="#ff4dd8"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" fill="#05030f"/>

  <g stroke="url(#neon)" stroke-width="5" stroke-linecap="round" fill="none" filter="url(#glow)">
    <line x1="24" y1="12" x2="20" y2="52"/>
    <line x1="44" y1="12" x2="40" y2="52"/>
    <line x1="12" y1="24" x2="52" y2="28"/>
    <line x1="12" y1="38" x2="52" y2="42"/>
  </g>
</svg>
